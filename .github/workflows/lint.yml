name: Lint source files

# Runs on the upstream template repo only.
# Prevents real company names / values from being committed to src/.
# Instance repos do not need this workflow — they have no config.yml in CI.

on:
  push:
    paths:
      - 'src/**'
  pull_request:
    paths:
      - 'src/**'

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make render binary executable
        run: chmod +x bin/render-linux

      # Lint mode reads config.yml to know which real values are forbidden,
      # then checks src/ files to ensure none appear.
      # On the upstream repo, config.yml should contain example/placeholder values.
      - name: Lint for hardcoded values
        run: ./bin/render-linux lint
