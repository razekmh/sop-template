name: Render and Build Site

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'config.yml'
      - 'config.example.yml'
      - 'tools/**'
      - 'hugo/**'
      - '!hugo/public/**'

jobs:
  render-and-build:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to push rendered output and gh-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true        # pulls Hugo theme
          fetch-depth: 0          # needed for gh-pages deployment

      # config.yml is gitignored for local secrets; CI uses example values unless
      # you commit config.yml or add an earlier step that writes it (e.g. secret).
      - name: Ensure config.yml for CI
        run: |
          if [ ! -f config.yml ]; then
            cp config.example.yml config.yml
          fi

      # ── Step 1: Render placeholders ──────────────────────────────────────────
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: tools/go.mod
          cache-dependency-path: tools/go.sum

      - name: Build render binary (Linux)
        working-directory: tools
        run: |
          go mod tidy
          GOOS=linux GOARCH=amd64 go build -o ../bin/render-linux render.go

      - name: Render SOP documents
        run: ./bin/render-linux
        # Fails if any placeholder is unresolved or any config value is empty.

      # ── Step 2: Build Hugo site ──────────────────────────────────────────────
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build site
        run: hugo --source hugo/ --minify
        # Only builds from hugo/content/ — src/ is never seen by Hugo

      # ── Step 3: Deploy to GitHub Pages ───────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: hugo/public
          # Deploys only the built static site — no source, no placeholders
